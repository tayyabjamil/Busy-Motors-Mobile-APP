name: Build & Release

on:
  push:
    tags:
      - 'v*-release'
      - 'v*-patch'

jobs:

  # ─── Full native build → App Store ───────────────────────────────────────
  build-and-release:
    if: endsWith(github.ref, '-release')
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select latest Xcode
        run: |
          LATEST=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          if [ -n "$LATEST" ]; then
            sudo xcode-select -s "/Applications/$LATEST/Contents/Developer"
            echo "Selected: $LATEST"
          else
            echo "No Xcode found"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install JS dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Install Fastlane & CocoaPods via Bundler
        run: cd ios && bundle install

      - name: Install CocoaPods
        run: cd ios && bundle exec pod install

      - name: Import Distribution Certificate
        env:
          DISTRIBUTION_CERT_P12: ${{ secrets.DISTRIBUTION_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          printf '%s' "$DISTRIBUTION_CERT_P12" | base64 -d > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

      - name: Import Provisioning Profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          printf '%s' "$PROVISIONING_PROFILE" | base64 -d > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Write App Store Connect API Key
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: echo "$APP_STORE_CONNECT_API_KEY" > ios/fastlane/app_store_connect_api_key.p8

      - name: Write .env.staging
        env:
          ENV_STAGING: ${{ secrets.ENV_STAGING }}
        run: |
          printf '%s\n' "$ENV_STAGING" > .env.staging
          grep -E '^(export )?[A-Za-z_][A-Za-z0-9_]*[[:space:]]*=|^#|^[[:space:]]*$' .env.staging > .env.staging.tmp && mv .env.staging.tmp .env.staging
          echo "=== .env.staging line count: $(wc -l < .env.staging) ==="

      - name: Write .env.production
        env:
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
        run: |
          printf '%s\n' "$ENV_PRODUCTION" > .env.production
          grep -E '^(export )?[A-Za-z_][A-Za-z0-9_]*[[:space:]]*=|^#|^[[:space:]]*$' .env.production > .env.production.tmp && mv .env.production.tmp .env.production
          echo "=== .env.production line count: $(wc -l < .env.production) ==="

      - name: Verify Secrets & Files
        continue-on-error: true
        run: |
          echo "=== Checking certificates ==="
          security find-identity -v -p codesigning
          echo "=== Checking provisioning profiles ==="
          ls ~/Library/MobileDevice/Provisioning\ Profiles/
          echo "=== Checking API key ==="
          ls -la ios/fastlane/app_store_connect_api_key.p8 && echo "API key file exists" || echo "API key file MISSING"
          echo "=== Checking env files ==="
          ls -la .env.staging .env.production
          echo "=== Checking Xcode schemes ==="
          cd ios && xcodebuild -workspace carScrap.xcworkspace -list

      - name: Build & Upload Staging to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: cd ios && bundle exec fastlane staging

      - name: Print build log on failure
        if: always()
        run: cat ~/Library/Logs/gym/carScrap-car\ scrap\ staging.log 2>/dev/null || echo "No log found"

      - name: Build & Upload Production to App Store
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: cd ios && bundle exec fastlane production

      - name: Print production build log on failure
        if: always()
        run: cat ~/Library/Logs/gym/carScrap-carScrapProduction.log 2>/dev/null || echo "No log found"

  # ─── OTA JS-only patch → hot-updater + Supabase ──────────────────────────
  ota-patch:
    if: endsWith(github.ref, '-patch')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install JS dependencies
        run: npm install --legacy-peer-deps

      - name: Write .env.production
        env:
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
        run: |
          printf '%s\n' "$ENV_PRODUCTION" > .env.production
          grep -E '^(export )?[A-Za-z_][A-Za-z0-9_]*[[:space:]]*=|^#|^[[:space:]]*$' .env.production > .env.production.tmp && mv .env.production.tmp .env.production

      - name: Deploy OTA patch
        env:
          HOT_UPDATER_SUPABASE_URL: ${{ secrets.HOT_UPDATER_SUPABASE_URL }}
          HOT_UPDATER_SUPABASE_ANON_KEY: ${{ secrets.HOT_UPDATER_SUPABASE_ANON_KEY }}
          HOT_UPDATER_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.HOT_UPDATER_SUPABASE_SERVICE_ROLE_KEY }}
          ENVFILE: .env.production
        run: npx hot-updater deploy --platform ios --channel production
